<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fire & Ice — Collections</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="theme--light">
  <div data-include="header.html"></div>

  <main>
    <article class="editorial-story">

      <header class="page-hero fade-in">
        <div class="container">
          <h1 id="lookbook-title">Collection</h1>
          <p id="lookbook-subtitle">A designer narrative edit.</p>

          <div class="collection-hero-banner" style="margin-top: 32px;">
            <img id="main-hero-img" src="" alt="Collection Hero">
          </div>
        </div>
      </header>

      <div class="container fade-in delay-1">
        <p class="story-intro"></p>

        <div class="story-split">
          <div class="story-image">
            <img src="" alt="Lookbook Section 1 Frame Image">
          </div>
          <div class="story-text">
            <h2></h2>
            <p></p>
          </div>
        </div>

        <div class="story-split reverse">
          <div class="story-image">
            <img src="" alt="Lookbook Section 2 Frame Image">
          </div>
          <div class="story-text">
            <h2></h2>
            <p></p>
          </div>
        </div>

        <div class="story-split">
          <div class="story-image">
            <img src="" alt="Lookbook Section 3 Frame Image">
          </div>
          <div class="story-text">
            <h2></h2>
            <p></p>
          </div>
        </div>
      </div>

      <div class="story-carousel-wrapper fade-in delay-2">
        <div class="container" style="position: relative;">
          <button class="lookbook-nav-arrow prev" aria-label="Scroll left">&larr;</button>
          <button class="lookbook-nav-arrow next" aria-label="Scroll right">&rarr;</button>
          <div class="story-carousel" id="carousel-container"></div>
        </div>
      </div>

      <section class="collection-footer-nav fade-in delay-3">
        <div class="container">
          <div style="text-align: center; margin-bottom: 48px;">
            <h2 style="font-size: var(--fs-h3); letter-spacing: 0.2em;">Explore Further Narratives</h2>
          </div>
          <div class="footer-nav-grid" id="lookbook-nav-injector"></div>
        </div>
      </section>

    </article>
  </main>

  <div data-include="footer.html"></div>

  <script src="assets/js/includes.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
